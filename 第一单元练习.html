<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>三年级科学 · 第一单元 · 方向大挑战</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --red: #e74c3c; --red-light: #fce4e4; --red-dark: #c0392b;
  --blue: #3498db; --blue-light: #dbeafe; --blue-dark: #2471a3;
  --gold: #f39c12; --green: #27ae60;
  --bg: #0f172a; --card: rgba(255,255,255,0.06); --text: #e2e8f0; --text-light: #94a3b8;
}
body { font-family: 'Microsoft YaHei', 'PingFang SC', sans-serif; background: var(--bg); overflow: hidden; user-select: none; -webkit-user-select: none; }

/* Screen system */
.screen { position: absolute; inset: 0; display: none; flex-direction: column; align-items: center; justify-content: center; }
.screen.active { display: flex; }

/* Title */
#screenTitle { background: linear-gradient(135deg, #1a1a2e, #16213e, #0f3460); }
.title-icon { font-size: 90px; margin-bottom: 16px; animation: float 3s ease-in-out infinite; }
@keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-12px); } }
#screenTitle h1 { font-size: 50px; font-weight: 900; background: linear-gradient(135deg, #f39c12, #e74c3c, #3498db); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
#screenTitle p { color: var(--text-light); font-size: 20px; margin: 10px 0 30px; }
.btn-start { padding: 16px 56px; font-size: 24px; font-weight: 700; background: linear-gradient(135deg, #e74c3c, #f39c12); color: #fff; border: none; border-radius: 50px; cursor: pointer; transition: all 0.3s; letter-spacing: 2px; }
.btn-start:hover { transform: scale(1.06); box-shadow: 0 8px 30px rgba(231,76,60,0.4); }

/* Score board */
.score-board { position: fixed; top: 0; left: 0; right: 0; display: flex; justify-content: center; gap: 30px; padding: 12px 20px; background: rgba(0,0,0,0.6); backdrop-filter: blur(10px); z-index: 50; }
.score-team { display: flex; align-items: center; gap: 10px; padding: 8px 24px; border-radius: 20px; font-size: 20px; font-weight: 700; }
.score-team.red { background: rgba(231,76,60,0.25); color: var(--red); border: 2px solid rgba(231,76,60,0.3); }
.score-team.blue { background: rgba(52,152,219,0.25); color: var(--blue); border: 2px solid rgba(52,152,219,0.3); }
.score-num { font-size: 28px; font-weight: 900; min-width: 40px; text-align: center; }
.score-team .dot { width: 14px; height: 14px; border-radius: 50%; }
.score-team.red .dot { background: var(--red); }
.score-team.blue .dot { background: var(--blue); }

/* Team overlay */
#overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 40; display: none; align-items: center; justify-content: center; flex-direction: column; }
#overlay.active { display: flex; }
#overlay h3 { color: #fff; font-size: 28px; margin-bottom: 24px; }
.overlay-btns { display: flex; gap: 30px; }
.overlay-btns button { width: 160px; height: 160px; border-radius: 24px; border: 3px solid rgba(255,255,255,0.2); font-size: 22px; font-weight: 700; color: #fff; cursor: pointer; transition: all 0.3s; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 8px; }
.overlay-btns button .emoji { font-size: 48px; }
.overlay-btns .btn-red:hover { background: rgba(231,76,60,0.4); border-color: var(--red); transform: scale(1.08); }
.overlay-btns .btn-blue:hover { background: rgba(52,152,219,0.4); border-color: var(--blue); transform: scale(1.08); }

/* Game screens background */
#screenMC, #screenTF, #screenFB, #screenScene { background: linear-gradient(180deg, #1a1a2e, #16213e); padding: 100px 20px 20px; justify-content: flex-start; }
.round-badge { position: fixed; top: 70px; left: 50%; transform: translateX(-50%); padding: 6px 20px; background: rgba(255,255,255,0.08); border-radius: 20px; color: var(--text-light); font-size: 14px; z-index: 50; }

/* Question card */
.q-card { width: 100%; max-width: 900px; background: var(--card); border: 1px solid rgba(255,255,255,0.1); border-radius: 20px; padding: 28px; }
.q-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 18px; }
.q-round { color: #f39c12; font-size: 16px; font-weight: 700; }
.q-status { display: flex; align-items: center; gap: 14px; }
.q-timer { font-size: 30px; font-weight: 900; color: #e74c3c; min-width: 70px; text-align: center; }
.q-timer.warning { animation: blink 0.5s infinite; }
@keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.2; } }
.q-num { color: var(--text-light); font-size: 15px; }
.q-type-tag { display: inline-block; padding: 3px 14px; background: rgba(155,89,182,0.3); color: #c39bdb; border-radius: 10px; font-size: 13px; margin-bottom: 14px; }
.q-type-tag.tag-tf { background: rgba(46,204,113,0.3); color: #6ddb9e; }
.q-type-tag.tag-fb { background: rgba(52,152,219,0.3); color: #7ab8e8; }
.q-type-tag.tag-scene { background: rgba(243,156,18,0.3); color: #f5c160; }
.q-text { font-size: 22px; color: var(--text); line-height: 1.7; margin-bottom: 22px; }

/* Option buttons */
.opts { display: grid; gap: 12px; }
.opt-btn { padding: 16px 22px; background: rgba(255,255,255,0.05); border: 2px solid rgba(255,255,255,0.12); border-radius: 14px; color: #fff; font-size: 18px; text-align: left; cursor: pointer; transition: all 0.25s; }
.opt-btn:hover { background: rgba(255,255,255,0.1); border-color: rgba(102,126,234,0.5); transform: translateX(4px); }
.opt-btn .opt-label { display: inline-block; width: 36px; height: 36px; line-height: 36px; background: rgba(102,126,234,0.3); color: #8899f0; border-radius: 10px; text-align: center; font-weight: 900; margin-right: 10px; }
.opt-btn.correct { background: rgba(39,174,96,0.2); border-color: #27ae60; color: #6ddb9e; }
.opt-btn.wrong { background: rgba(231,76,60,0.2); border-color: #e74c3c; color: #e88c8c; }

/* TF buttons */
.tf-area { display: flex; gap: 20px; justify-content: center; }
.tf-btn { width: 180px; height: 80px; border-radius: 16px; border: 3px solid rgba(255,255,255,0.15); background: rgba(255,255,255,0.04); color: #fff; font-size: 28px; font-weight: 900; cursor: pointer; transition: all 0.3s; }
.tf-btn:hover { transform: scale(1.05); }
.tf-btn.true-btn:hover { background: rgba(39,174,96,0.25); border-color: #27ae60; }
.tf-btn.false-btn:hover { background: rgba(231,76,60,0.25); border-color: #e74c3c; }
.tf-btn.correct { background: rgba(39,174,96,0.3); border-color: #27ae60; }
.tf-btn.wrong { background: rgba(231,76,60,0.3); border-color: #e74c3c; }

/* Feedback & nav */
.feedback { text-align: center; font-size: 20px; margin-top: 18px; min-height: 30px; font-weight: 700; }
.feedback.correct { color: #6ddb9e; }
.feedback.wrong { color: #e88c8c; }
.nav-row { display: flex; gap: 14px; justify-content: center; margin-top: 16px; flex-wrap: wrap; }
.btn-nav { padding: 12px 32px; border: none; border-radius: 25px; font-size: 17px; cursor: pointer; font-weight: 700; transition: all 0.3s; color: #fff; }
.btn-next { background: linear-gradient(135deg, #667eea, #764ba2); }
.btn-next:hover { transform: scale(1.05); }
.btn-reveal { background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); }
.btn-reveal:hover { background: rgba(255,255,255,0.18); }
.btn-ok { background: #27ae60; }
.btn-ok:hover { background: #2ecc71; }
.btn-no { background: #e74c3c; }
.btn-no:hover { background: #ec5c4c; }

/* Fill in blank reveal */
.blank-reveal { text-align: center; margin-top: 16px; font-size: 22px; color: #f39c12; font-weight: 700; }

/* Scene question */
.scene-panel { display: flex; flex-wrap: wrap; gap: 20px; margin: 16px 0; }
.scene-img { flex: 1; min-width: 280px; min-height: 180px; background: rgba(255,255,255,0.04); border-radius: 14px; display: flex; align-items: center; justify-content: center; font-size: 60px; border: 1px solid rgba(255,255,255,0.08); }

/* Round complete */
#screenRC { background: linear-gradient(135deg, #1a1a2e, #16213e); }
#screenRC h2 { font-size: 36px; color: #fff; margin-bottom: 10px; }
#screenRC .round-stats { color: var(--text-light); font-size: 18px; margin-bottom: 24px; }
.score-show { display: flex; gap: 40px; margin-bottom: 30px; }
.score-show .s-box { padding: 24px 40px; border-radius: 20px; text-align: center; min-width: 160px; }
.score-show .s-box.red { background: rgba(231,76,60,0.15); border: 2px solid rgba(231,76,60,0.3); }
.score-show .s-box.blue { background: rgba(52,152,219,0.15); border: 2px solid rgba(52,152,219,0.3); }
.score-show .s-box .s-name { font-size: 18px; color: var(--text-light); }
.score-show .s-box .s-num { font-size: 48px; font-weight: 900; margin-top: 6px; }
.score-show .s-box.red .s-num { color: var(--red); }
.score-show .s-box.blue .s-num { color: var(--blue); }

/* Final */
#screenFinal { background: linear-gradient(135deg, #1a1a2e, #16213e); }
#screenFinal .winner-icon { font-size: 100px; margin-bottom: 10px; animation: float 2s ease-in-out infinite; }
#screenFinal h2 { font-size: 42px; color: #fff; margin-bottom: 8px; }
#screenFinal .final-scores { display: flex; gap: 50px; margin: 20px 0; }
.fs-box { text-align: center; }
.fs-box .fs-icon { font-size: 40px; margin-bottom: 6px; }
.fs-box .fs-name { color: var(--text-light); font-size: 16px; }
.fs-box .fs-num { font-size: 56px; font-weight: 900; }
.fs-box.red .fs-num { color: var(--red); }
.fs-box.blue .fs-num { color: var(--blue); }

/* Confetti */
canvas#confetti { position: fixed; inset: 0; pointer-events: none; z-index: 100; }

/* Scene grid */
.scene-grid { display: grid; gap: 10px; justify-content: center; margin: 10px 0; }
.scene-cell { width: 52px; height: 52px; border-radius: 8px; background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.08); display: flex; align-items: center; justify-content: center; font-size: 12px; color: var(--text-light); }
.scene-cell.arrow { background: rgba(243,156,18,0.2); border-color: #f39c12; font-size: 18px; }
.scene-cell.start { background: rgba(39,174,96,0.2); border-color: #27ae60; font-size: 14px; font-weight: 700; color: #6ddb9e; }
.scene-cell.end { background: rgba(231,76,60,0.2); border-color: #e74c3c; font-size: 14px; font-weight: 700; color: #e88c8c; }
.scene-controls { display: flex; gap: 8px; justify-content: center; margin-top: 8px; flex-wrap: wrap; }
.scene-ctrl-btn { padding: 8px 16px; border-radius: 10px; border: 2px solid rgba(255,255,255,0.15); background: rgba(255,255,255,0.06); color: #fff; font-size: 16px; cursor: pointer; font-weight: 700; transition: all 0.2s; }
.scene-ctrl-btn:hover { background: rgba(255,255,255,0.12); }
.scene-ctrl-btn.active { border-color: #f39c12; background: rgba(243,156,18,0.2); }

::-webkit-scrollbar { width: 5px; }
::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.12); border-radius: 3px; }
</style>
</head>
<body>

<!-- TITLE -->
<div class="screen active" id="screenTitle">
  <div class="title-icon">🧭</div>
  <h1>方向大挑战</h1>
  <p>三年级科学 · 第一单元复习闯关</p>
  <button class="btn-start" onclick="startGame()">开始闯关 ▶</button>
</div>

<!-- OVERLAY -->
<div id="overlay"><h3 id="overlayText">请选择答题队伍</h3><div class="overlay-btns"><button class="btn-red" onclick="pickTeam('red')"><span class="emoji">🔴</span>红队</button><button class="btn-blue" onclick="pickTeam('blue')"><span class="emoji">🔵</span>蓝队</button></div></div>

<!-- SCOREBOARD -->
<div class="score-board" id="scoreBoard" style="display:none">
  <div class="score-team red"><span class="dot"></span>红队 <span class="score-num" id="redScore">0</span></div>
  <div class="score-team blue"><span class="dot"></span>蓝队 <span class="score-num" id="blueScore">0</span></div>
</div>

<!-- ROUND BADGE -->
<div class="round-badge" id="roundBadge" style="display:none"></div>

<!-- ROUND 1: MC -->
<div class="screen" id="screenMC">
  <div class="q-card">
    <div class="q-header"><span class="q-round">🔥 第一关：火眼金睛</span><div class="q-status"><span class="q-timer" id="mcTimer">⏱15</span><span class="q-num" id="mcNum">1/10</span></div></div>
    <span class="q-type-tag">选择题</span>
    <div class="q-text" id="mcQ"></div>
    <div class="opts" id="mcOpts"></div>
    <div class="feedback" id="mcFb"></div>
    <div class="nav-row"><button class="btn-nav btn-next" id="mcNext" style="display:none" onclick="nextMC()">下一题 ▶</button></div>
  </div>
</div>

<!-- ROUND 2: TF -->
<div class="screen" id="screenTF">
  <div class="q-card">
    <div class="q-header"><span class="q-round">⚖️ 第二关：明辨是非</span><div class="q-status"><span class="q-timer" id="tfTimer">⏱8</span><span class="q-num" id="tfNum">1/8</span></div></div>
    <span class="q-type-tag tag-tf">判断题</span>
    <div class="q-text" id="tfQ"></div>
    <div class="tf-area"><button class="tf-btn true-btn" onclick="answerTF(true)">✓ 正确</button><button class="tf-btn false-btn" onclick="answerTF(false)">✗ 错误</button></div>
    <div class="feedback" id="tfFb"></div>
    <div class="nav-row"><button class="btn-nav btn-next" id="tfNext" style="display:none" onclick="nextTF()">下一题 ▶</button></div>
  </div>
</div>

<!-- ROUND 3: FB -->
<div class="screen" id="screenFB">
  <div class="q-card">
    <div class="q-header"><span class="q-round">📝 第三关：记忆达人</span><span class="q-num" id="fbNum">1/6</span></div>
    <span class="q-type-tag tag-fb">填空题</span>
    <div class="q-text" id="fbQ"></div>
    <div class="blank-reveal" id="fbRev"></div>
    <div class="nav-row" style="flex-wrap:wrap">
      <button class="btn-nav btn-reveal" id="fbRevBtn" onclick="revealFB()">点我看答案 🔍</button>
      <div id="fbConfirm" style="display:none;display:flex;gap:12px">
        <button class="btn-nav btn-ok" onclick="fbOK(true)">✅ 答对了 +10</button>
        <button class="btn-nav btn-no" onclick="fbOK(false)">❌ 没答对</button>
      </div>
      <button class="btn-nav btn-next" id="fbNext" style="display:none" onclick="nextFB()">下一题 ▶</button>
    </div>
  </div>
</div>

<!-- ROUND 4: SCENE -->
<div class="screen" id="screenScene">
  <div class="q-card">
    <div class="q-header"><span class="q-round">🗺️ 第四关：身临其境</span><div class="q-status"><span class="q-timer" id="scTimer">⏱20</span><span class="q-num" id="scNum">1/4</span></div></div>
    <span class="q-type-tag tag-scene">情境应用题</span>
    <div class="q-text" id="scQ"></div>
    <div id="scVisual"></div>
    <div class="opts" id="scOpts"></div>
    <div class="feedback" id="scFb"></div>
    <div class="nav-row"><button class="btn-nav btn-next" id="scNext" style="display:none" onclick="nextScene()">下一题 ▶</button></div>
  </div>
</div>

<!-- ROUND COMPLETE -->
<div class="screen" id="screenRC">
  <h2 id="rcTitle">🎉 第N关通过！</h2>
  <div class="round-stats" id="rcStats"></div>
  <div class="score-show" id="rcScores"></div>
  <button class="btn-start" id="rcBtn" onclick="nextRound()">进入下一关 ▶</button>
</div>

<!-- FINAL -->
<div class="screen" id="screenFinal">
  <div class="winner-icon" id="winIcon">🏆</div>
  <h2 id="winText"></h2>
  <div class="final-scores" id="finalScores"></div>
  <button class="btn-start" onclick="restartGame()">🔄 再来一局</button>
</div>

<canvas id="confetti"></canvas>

<script>
// ===== AUDIO =====
const AudioCtx = window.AudioContext || window.webkitAudioContext;
let actx;
function beep(f, d, t='sine', v=0.15) {
  if (!actx) actx = new AudioCtx();
  const o = actx.createOscillator();
  const g = actx.createGain();
  o.type = t; o.frequency.value = f; g.gain.value = v;
  o.connect(g); g.connect(actx.destination);
  o.start(); g.gain.exponentialRampToValueAtTime(0.001, actx.currentTime + d);
  o.stop(actx.currentTime + d);
}
function sfx(s) {
  if (s==='correct') { beep(523,0.1); setTimeout(()=>beep(659,0.1),100); setTimeout(()=>beep(784,0.2),200); }
  else if (s==='wrong') { beep(200,0.4,'square',0.1); }
  else if (s==='click') beep(440,0.05);
  else if (s==='win') { beep(523,0.12); setTimeout(()=>beep(659,0.12),120); setTimeout(()=>beep(784,0.12),240); setTimeout(()=>beep(1047,0.3),360); }
}

// ===== STATE =====
let gs = { red:0, blue:0, team:null, round:0, timer:null, tLeft:0,
  mcIdx:0, mcDone:false, tfIdx:0, tfDone:false, fbIdx:0, fbDone:false, scIdx:0, scDone:false };

// ===== SCREENS =====
function show(id) { document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active')); document.getElementById(id).classList.add('active'); }
function showOverlay(cb) { document.getElementById('overlay').classList.add('active'); window._overlayCB = cb; }
function hideOverlay() { document.getElementById('overlay').classList.remove('active'); }
function pickTeam(t) { gs.team = t; hideOverlay(); if (window._overlayCB) window._overlayCB(); }

function updateScores() { document.getElementById('redScore').textContent=gs.red; document.getElementById('blueScore').textContent=gs.blue; }

// ===== TIMER =====
function startTimer(sec, elId, cb) {
  clearInterval(gs.timer); gs.tLeft = sec;
  const el = document.getElementById(elId);
  el.textContent = '⏱'+sec; el.classList.remove('warning');
  gs.timer = setInterval(() => { gs.tLeft--;
    el.textContent = '⏱'+gs.tLeft;
    if (gs.tLeft <= 3) el.classList.add('warning');
    if (gs.tLeft <= 0) { clearInterval(gs.timer); cb(); }
  }, 1000);
}
function stopTimer() { clearInterval(gs.timer); }

// ===== START =====
function startGame() {
  gs.red=0;gs.blue=0;gs.round=0;gs.mcIdx=0;gs.tfIdx=0;gs.fbIdx=0;gs.scIdx=0;
  updateScores();
  document.getElementById('scoreBoard').style.display='flex';
  document.getElementById('roundBadge').style.display='block';
  document.getElementById('roundBadge').textContent='🔥 第一关：火眼金睛';
  document.getElementById('confetti').style.display='none';
  loadMC();
}

// ===== ROUND 1: MULTIPLE CHOICE (10 questions - NEW, not from outline) =====
const mcQs = [
  { q: '小明在野外迷路了。他看到太阳正在他的正前方缓缓升起。请问他的右手边是什么方向？', opts: ['东方', '南方', '西方', '北方'], ans: 1,
    explain: '早晨太阳在东方升起，面朝东方时，右手边（右边）是南方。' },
  { q: '一棵大树的树桩横切面上，年轮间距较宽的一侧通常朝向哪个方向？', opts: ['东方', '南方', '西方', '北方'], ans: 1,
    explain: '南侧阳光充足，树木生长更快，年轮间距更宽。' },
  { q: '小丽在正午12点观察旗杆的影子，影子指向正北方。此时太阳大约在什么方向？', opts: ['东方', '南方', '西方', '北方'], ans: 1,
    explain: '正午太阳偏南（北半球），影子与太阳方向相反，影子指向北方说明太阳在南方。' },
  { q: '两根磁针靠在一起，结果它们互相推开。这说明它们靠近的两端是什么关系？', opts: ['都是N极', '都是S极', '是同极', '是异极'], ans: 2,
    explain: '同极相互排斥。不管是N-N还是S-S，只要是同极就会推开。但题目问的是"什么关系"，所以"同极"最准确。' },
  { q: '指南针的红色N极总是指向地理北方。这是因为地理北方附近有什么？', opts: ['地磁N极', '地磁S极', '巨大的铁矿', '北极星'], ans: 1,
    explain: '地磁南极在地理北极附近。异极相吸，所以磁针N极被地磁S极吸引，指向地理北方。' },
  { q: '小华用磁铁摩擦钢针来制作磁针。他发现摩擦过的钢针几乎没磁性，最可能的原因是什么？', opts: ['钢针不是铁做的', '他用了来回摩擦', '磁铁本身没磁性', '摩擦次数太少'], ans: 1,
    explain: '磁化时必须沿同一方向摩擦。来回摩擦会使磁化效果相互抵消，这是制作磁针最常见的错误。' },
  { q: '傍晚时分，一位同学面朝落日的方向。他的左边是什么方向？', opts: ['东方', '南方', '西方', '北方'], ans: 1,
    explain: '傍晚太阳在西方落下。面朝西方时，左边是南方，右边是北方。' },

function loadTF() {

}
function timeUpTF() {
  gs.tfDone = true;
  const q = tfQs[gs.tfIdx];
  document.querySelectorAll('.tf-btn').forEach(b => { b.style.pointerEvents='none'; if((b.classList.contains('true-btn')&&q.ans)||(b.classList.contains('false-btn')&&!q.ans)) b.classList.add('correct'); });
  document.getElementById('tfFb').textContent = `⏰ 时间到！${q.ans?'正确':'错误'} — ${q.explain}`;
  document.getElementById('tfFb').className = 'feedback wrong'; sfx('wrong');
  document.getElementById('tfNext').style.display='inline-block';
}
function answerTF(u) {
  if (gs.tfDone) return; gs.tfDone = true; stopTimer();
  const q = tfQs[gs.tfIdx];
  const tb = document.querySelector('.true-btn'), fb = document.querySelector('.false-btn');
  tb.style.pointerEvents='none'; fb.style.pointerEvents='none';
  if (q.ans) { tb.classList.add('correct'); if (!u) fb.classList.add('wrong'); }
  else { fb.classList.add('correct'); if (u) tb.classList.add('wrong'); }
  if (u === q.ans) {
    document.getElementById('tfFb').textContent = '✅ 判断正确！+10分'; document.getElementById('tfFb').className = 'feedback correct';
    sfx('correct'); if (gs.team==='red') gs.red+=10; else gs.blue+=10;
  } else {
    document.getElementById('tfFb').textContent = `❌ 判断错误！${q.explain}`; document.getElementById('tfFb').className = 'feedback wrong';
    sfx('wrong');
  }
  updateScores(); document.getElementById('tfNext').style.display='inline-block';
}

// ===== CONFETTI =====
function launchConfetti() {
  const c = document.getElementById('confetti');
  c.style.display = 'block'; c.width = window.innerWidth; c.height = window.innerHeight;
  const ctx = c.getContext('2d');
  const particles = [];
  for (let i = 0; i < 200; i++) {
    particles.push({ x: Math.random()*c.width, y: Math.random()*c.height*-1, w: Math.random()*10+5, h: Math.random()*6+4,
      color: ['#e74c3c','#f39c12','#3498db','#2ecc71','#9b59b6','#e67e22','#1abc9c'][Math.floor(Math.random()*7)],
      vy: Math.random()*3+2, vx: (Math.random()-0.5)*3, rot: Math.random()*360, rv: (Math.random()-0.5)*8 });
  }
  function draw() {
    ctx.clearRect(0, 0, c.width, c.height);
    let alive = false;
    particles.forEach(p => {
      p.y += p.vy; p.x += p.vx; p.rot += p.rv;
      if (p.y < c.height + 50) alive = true;
      ctx.save(); ctx.translate(p.x,p.y); ctx.rotate(p.rot*Math.PI/180);
      ctx.fillStyle = p.color; ctx.fillRect(-p.w/2, -p.h/2, p.w, p.h);
      ctx.restore();
    });
    if (alive) requestAnimationFrame(draw);
    else c.style.display = 'none';
  }
  draw();
}

function restartGame() { show('screenTitle'); document.getElementById('scoreBoard').style.display='none'; document.getElementById('roundBadge').style.display='none'; document.getElementById('confetti').style.display='none'; }
